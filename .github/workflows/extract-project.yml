name: Extrair projeto do ZIP

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Caminho do ZIP dentro do repositório"
        required: true
        default: "mundo-leo-lucas-github-pages.zip"
      clean_destination:
        description: "Remover arquivos antigos antes de copiar a nova estrutura"
        required: true
        type: boolean
        default: true

  push:
    branches:
      - main
    paths:
      - "*.zip"
      - "**/*.zip"

permissions:
  contents: write

concurrency:
  group: extract-project-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    name: Extrair e organizar projeto
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Localizar arquivo ZIP
        id: locate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_ZIP: ${{ inputs.zip_path }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            ZIP_PATH="$MANUAL_ZIP"
          else
            # No acionamento por push, seleciona o ZIP alterado no commit.
            ZIP_PATH="$(
              git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" \
                | grep -Ei '\.zip$' \
                | head -n 1 || true
            )"

            # Fallback para o ZIP mais recentemente modificado.
            if [[ -z "$ZIP_PATH" ]]; then
              ZIP_PATH="$(
                find . -type f -iname '*.zip' -not -path './.git/*' \
                  -printf '%T@ %P\n' \
                  | sort -nr \
                  | head -n 1 \
                  | cut -d' ' -f2- || true
              )"
            fi
          fi

          if [[ -z "$ZIP_PATH" || ! -f "$ZIP_PATH" ]]; then
            echo "::error::Arquivo ZIP não encontrado: ${ZIP_PATH:-não informado}"
            exit 1
          fi

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "ZIP selecionado: $ZIP_PATH"

      - name: Validar e extrair ZIP com segurança
        shell: bash
        env:
          ZIP_PATH: ${{ steps.locate.outputs.zip_path }}
        run: |
          set -euo pipefail

          rm -rf .extract-tmp
          mkdir -p .extract-tmp/unpacked

          python3 - <<'PY'
          from pathlib import Path, PurePosixPath
          from zipfile import ZipFile
          import os

          zip_path = Path(os.environ["ZIP_PATH"])
          destination = Path(".extract-tmp/unpacked").resolve()

          with ZipFile(zip_path) as archive:
              for member in archive.infolist():
                  relative = PurePosixPath(member.filename)

                  # Bloqueia caminhos absolutos e tentativas de escapar da pasta.
                  if relative.is_absolute() or ".." in relative.parts:
                      raise SystemExit(
                          f"Entrada insegura encontrada no ZIP: {member.filename}"
                      )

                  target = (destination / Path(*relative.parts)).resolve()
                  if destination not in target.parents and target != destination:
                      raise SystemExit(
                          f"Entrada fora do destino encontrada: {member.filename}"
                      )

                  if member.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue

                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(member) as source, target.open("wb") as output:
                      output.write(source.read())

          print(f"ZIP extraído com segurança em: {destination}")
          PY

      - name: Detectar raiz real do projeto
        id: project-root
        shell: bash
        run: |
          set -euo pipefail

          EXTRACTED=".extract-tmp/unpacked"

          # Ignora metadados comuns do macOS.
          rm -rf "$EXTRACTED/__MACOSX"
          find "$EXTRACTED" -name '.DS_Store' -delete

          mapfile -t ROOT_ITEMS < <(
            find "$EXTRACTED" -mindepth 1 -maxdepth 1 \
              ! -name '__MACOSX' \
              -printf '%p\n'
          )

          if [[ "${#ROOT_ITEMS[@]}" -eq 1 && -d "${ROOT_ITEMS[0]}" ]]; then
            PROJECT_ROOT="${ROOT_ITEMS[0]}"
            echo "O ZIP contém uma única pasta principal."
          else
            PROJECT_ROOT="$EXTRACTED"
            echo "O conteúdo do ZIP já está organizado a partir da raiz."
          fi

          if [[ ! -f "$PROJECT_ROOT/index.html" ]]; then
            echo "::warning::index.html não foi encontrado na raiz detectada: $PROJECT_ROOT"
          fi

          echo "project_root=$PROJECT_ROOT" >> "$GITHUB_OUTPUT"
          echo "Raiz detectada: $PROJECT_ROOT"
          echo
          echo "Estrutura encontrada:"
          find "$PROJECT_ROOT" -maxdepth 3 -print | sort

      - name: Sincronizar estrutura na raiz do repositório
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.project-root.outputs.project_root }}
          ZIP_PATH: ${{ steps.locate.outputs.zip_path }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_CLEAN: ${{ inputs.clean_destination }}
        run: |
          set -euo pipefail

          CLEAN="true"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            CLEAN="${MANUAL_CLEAN:-true}"
          fi

          RSYNC_ARGS=(-a --human-readable)

          if [[ "$CLEAN" == "true" ]]; then
            RSYNC_ARGS+=(--delete)
          fi

          # Preserva infraestrutura do repositório e o ZIP de origem.
          RSYNC_ARGS+=(
            --exclude='.git/'
            --exclude='.github/'
            --exclude='.extract-tmp/'
            --exclude="$ZIP_PATH"
          )

          rsync "${RSYNC_ARGS[@]}" "$PROJECT_ROOT"/ ./

          rm -rf .extract-tmp

          echo
          echo "Estrutura final:"
          find . -maxdepth 3 \
            -not -path './.git*' \
            -not -path './.github*' \
            -print | sort

      - name: Validar estrutura mínima do aplicativo
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED=(
            "index.html"
            "css/styles.css"
            "js/app.js"
            "js/data.js"
            "js/audio.js"
            "js/storage.js"
            "manifest.webmanifest"
            "service-worker.js"
          )

          FAILED=0
          for FILE in "${REQUIRED[@]}"; do
            if [[ -f "$FILE" ]]; then
              echo "PASS: $FILE"
            else
              echo "::error::Arquivo obrigatório ausente: $FILE"
              FAILED=1
            fi
          done

          if [[ "$FAILED" -ne 0 ]]; then
            exit 1
          fi

      - name: Criar commit com os arquivos extraídos
        shell: bash
        env:
          ZIP_PATH: ${{ steps.locate.outputs.zip_path }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma alteração encontrada após a extração."
            exit 0
          fi

          git commit -m "Extract project from ${ZIP_PATH}"
          git push
